# Initial-Seed für das Ref4EP-Portal — Quelle: Antrag/Gantt.
# Inhalte verbindlich gemäß docs/mvp_specification.md §13.
# Lead-Vererbung: Sub-WPs ohne 'lead' erben den Lead des Parent-WP.
#
# Block 0027 — Workpackage-Zeitplan
# ----------------------------------
# Der offizielle Antrag definiert WP-Zeiträume **monatsgenau** auf einer
# 1–36-Skala. Wir kodieren sie als ``start_month``/``end_month`` (1–36)
# pro Sub-WP. Hauptpakete tragen bewusst keine Monatswerte — der Gantt
# aggregiert sie aus den Kindern.
#
# ``project_start_date`` ist der Anker für die Konvertierung in echte
# Datumswerte. Wert ist aus den Meilenstein-Daten weiter unten
# rückrechenbar: MS3 (Monat 25) auf 2028-02-15, MS2 (Monat 13) auf
# 2027-02-15, MS4 (Monat 36) auf 2029-02-28 — alle drei stützen
# Projektmonat 1 = März 2026.
#
# Konvertierungs-Konvention im SeedService:
#   start_date = project_start_date + (start_month - 1) Monate (1. Tag)
#   end_date   = project_start_date + end_month   Monate − 1 Tag
#                (= letzter Tag des Endmonats)
#
# Setze ``project_start_date: null`` (oder lasse den Schlüssel weg),
# wenn der Seed die Datumsfelder bewusst leer lassen soll. Dann setzt
# der Admin später per UI/Patch.

project_start_date: 2026-03-01

