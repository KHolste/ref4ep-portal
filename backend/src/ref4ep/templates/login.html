{% extends "_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <article class="login">
    <h1>Anmelden</h1>
    {% if error %}
      <p class="error" role="alert">{{ error }}</p>
    {% endif %}
    <form method="post" action="/login" autocomplete="on">
      <label>
        E-Mail
        <input type="email" name="email" value="{{ email or '' }}" required autofocus />
      </label>
      <label>
        Passwort
        <input type="password" name="password" required minlength="1" />
      </label>
      <button type="submit">Anmelden</button>
    </form>
    <p class="hint">
      Noch kein Konto? Wende dich an deinen Konsortialadministrator.
    </p>
  </article>
{% endblock %}
