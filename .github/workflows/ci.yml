name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-sqlite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # REF4EP_SESSION_SECRET ist seit dem Auth-Hardening Pflichtfeld
      # mit ≥ 32 Zeichen (siehe backend/src/ref4ep/api/config.py).
      # CI-only Dummy — kein Produktions-Secret.
      REF4EP_SESSION_SECRET: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      REF4EP_DATABASE_URL: sqlite:///../data/test.db
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Format check (ruff)
        run: ruff format --check src tests
      - name: Settings smoke check
        run: python -c "from ref4ep.api.config import get_settings; get_settings()"
      - name: Alembic upgrade head (SQLite)
        run: |
          mkdir -p ../data
          alembic upgrade head
      - name: Pytest
        run: pytest --cov=ref4ep --cov-report=term-missing --cov-fail-under=85

  backend-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ref4ep
          POSTGRES_PASSWORD: ref4ep
          POSTGRES_DB: ref4ep
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REF4EP_DATABASE_URL: postgresql+psycopg://ref4ep:ref4ep@localhost:5432/ref4ep
      REF4EP_SESSION_SECRET: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - name: Install package (dev + postgres)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"
      - name: Settings smoke check
        run: python -c "from ref4ep.api.config import get_settings; get_settings()"
      - name: Alembic upgrade head (PostgreSQL)
        run: alembic upgrade head
      - name: Pytest
        run: pytest --cov=ref4ep --cov-report=term-missing --cov-fail-under=85
